[project]
site_name = "terraform-aws-security-baseline"
site_description = "Opinionated AWS security baseline for OpenTofu — account hardening, audit logging, AWS Config, threat detection, alerts, and an MFA-required operator role."
site_author = "Matt Cockayne"
site_url = "https://github.com/phpboyscout/terraform-aws-security-baseline"
copyright = """
Copyright &copy; 2026 Matt Cockayne
"""
exclude_docs = "_template.md"

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "header.autohide",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
    "toc.integrate",
]

[project.theme.font]
text = "Inter"
code = "Jetbrains Mono"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.extra.status]
draft = "Draft"
DRAFT = "Draft"
in-review = "In Review"
IN-REVIEW = "In Review"
approved = "Approved"
APPROVED = "Approved"
in-progress = "In Progress"
IN-PROGRESS = "In Progress"
implemented = "Implemented"
IMPLEMENTED = "Implemented"
superseded = "Superseded"
SUPERSEDED = "Superseded"
rejected = "Rejected"
REJECTED = "Rejected"
deprecated = "Deprecated"
DEPRECATED = "Deprecated"
active = "Active"
ACTIVE = "Active"
